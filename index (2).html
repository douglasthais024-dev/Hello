<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Premium Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            background: #090d16;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .window-mobile-fullscreen {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0f172a;
        }

        /* --- CABEÇALHO PREMIUM --- */
        .chat-header {
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .user-info h3 {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .user-info p {
            color: #34d399;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .user-info p::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #34d399;
            border-radius: 50%;
            box-shadow: 0 0 8px #34d399;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-action:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.92);
        }

        /* --- ÁREA DE MENSAGENS COM ROLAGEM SUAVE --- */
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(135deg, #121026 0%, #070514 100%);
            background-size: cover;
            background-position: center;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-overflow-scrolling: touch; 
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        /* --- BALÕES DE MENSAGEM (ESTILO WHATSAPP/IOS) --- */
        .message-row {
            display: flex;
            width: 100%;
            animation: messageSlideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-row.sent { justify-content: flex-end; }
        .message-row.received { justify-content: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 78%; 
            font-size: 0.92rem;
            line-height: 1.45;
            color: #f8fafc;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            word-wrap: break-word;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .message-row.sent .message-bubble {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border-bottom-right-radius: 4px;
        }

        .message-row.received .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* Meta de Horário e Status de Confirmação */
        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            font-size: 0.68rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            align-self: flex-end;
            user-select: none;
        }

        .message-row.sent .message-meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .status-check {
            color: #38bdf8;
            font-weight: bold;
        }

        /* Imagens e Mídias */
        .message-bubble img {
            max-width: 100%;
            max-height: 240px;
            border-radius: 12px;
            margin-top: 2px;
            display: block;
            object-fit: cover;
        }

        /* Balão de Áudio */
        .audio-player-bubble {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            padding: 4px 0;
        }

        .audio-play-btn {
            background: white;
            color: #4f46e5;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
        }

        .audio-waveform {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }

        .wave-bar {
            width: 3px;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
            height: 40%;
        }

        .wave-bar.active {
            background: #ffffff;
            animation: pulseWave 1s infinite alternate;
        }

        @keyframes pulseWave {
            0% { height: 30%; }
            100% { height: 100%; }
        }

        /* --- INPUT EXPANSÍVEL (TEXTAREA) COM COMPORTAMENTO INTELIGENTE --- */
        .chat-input-area {
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            position: relative;
            z-index: 20;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 22px;
            padding: 4px 14px;
            display: flex;
            align-items: flex-end;
            min-height: 40px;
            max-height: 120px;
            transition: border-color 0.2s, background 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-input-area textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 0.95rem;
            resize: none;
            padding: 8px 0;
            max-height: 100px;
            line-height: 1.35;
        }

        .chat-input-area textarea::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .btn-send-wrapper {
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-send {
            background: #4f46e5;
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-send:active {
            transform: scale(0.9);
            background: #4338ca;
        }

        /* --- ESTADO DE GRAVAÇÃO (MIC) --- */
        .recording-container {
            display: none;
            align-items: center;
            gap: 12px;
            flex: 1;
            height: 40px;
            color: #ef4444;
            font-size: 0.9rem;
            padding-left: 8px;
        }

        .record-dot {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulseRecord 0.8s infinite alternate;
        }

        @keyframes pulseRecord {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* --- PICKER DE EMOJIS EM BOTTOM SHEET --- */
        .emoji-picker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 30;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        .emoji-picker.active {
            transform: translateY(0);
        }

        .emoji-picker span {
            font-size: 1.6rem; 
            cursor: pointer;
            text-align: center;
            user-select: none;
            transition: transform 0.1s;
        }

        .emoji-picker span:active {
            transform: scale(1.3);
        }

        /* --- INDICADOR DE DIGITANDO --- */
        .typing-bubble {
            display: flex;
            gap: 4px;
            padding: 14px 18px !important;
            align-items: center;
            width: fit-content;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: bounceDot 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounceDot {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="window-mobile-fullscreen">
        
        <div class="chat-header">
            <div class="user-profile">
                <div class="avatar">🤖</div>
                <div class="user-info">
                    <h3>Chat Inteligente</h3>
                    <p id="chatStatus">Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-action" id="btnWallpaper" title="Mudar Fundo">🖼️</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-row received">
                <div class="message-bubble">
                    Olá! Bem-vindo ao novo chat mobile. 
                    Experimente enviar áudio 🎤, mandar imagens 📷 ou digitar para ver o indicador em tempo real! ✨
                    <div class="message-meta">
                        <span class="meta-time">14:00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="emoji-picker" id="emojiPicker">
            <span>😀</span><span>😃</span><span>😄</span><span>😁</span><span>😆</span><span>😅</span><span>😂</span>
            <span>😊</span><span>😍</span><span>🥰</span><span>😘</span><span>😜</span><span>😎</span><span>🤔</span>
            <span>👍</span><span>🔥</span><span>❤️</span><span>👏</span><span>🎉</span><span>🚀</span><span>✨</span>
        </div>

        <div class="chat-input-area">
            <button class="btn-action" id="btnEmoji" style="font-size: 1.15rem;">😊</button>
            
            <button class="btn-action" id="btnFile" title="Foto" style="font-size: 1.15rem;">📷</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">

            <div class="input-wrapper" id="inputWrapper">
                <textarea id="messageInput" placeholder="Mensagem..." rows="1" autocomplete="off"></textarea>
                
                <div class="recording-container" id="recordingContainer">
                    <div class="record-dot"></div>
                    <span id="recordTimer">Gravando 00:00</span>
                </div>
            </div>
            
            <div class="btn-send-wrapper">
                <button class="btn-send" id="btnSend">🎤</button>
            </div>
        </div>

    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const inputWrapper = document.getElementById('inputWrapper');
        const btnSend = document.getElementById('btnSend');
        const btnEmoji = document.getElementById('btnEmoji');
        const emojiPicker = document.getElementById('emojiPicker');
        const btnWallpaper = document.getElementById('btnWallpaper');
        const btnFile = document.getElementById('btnFile');
        const fileInput = document.getElementById('fileInput');
        const chatStatus = document.getElementById('chatStatus');
        const recordingContainer = document.getElementById('recordingContainer');
        const recordTimer = document.getElementById('recordTimer');

        const wallpapers = [
            'linear-gradient(135deg, #121026 0%, #070514 100%)',
            'linear-gradient(135deg, #0f172a 0%, #0284c7 100%)',
            'linear-gradient(135deg, #090d16 0%, #1e1b4b 100%)',
            '#111827',
            'linear-gradient(to top, #09203f 0%, #537895 100%)'
        ];
        let currentWallpaperIdx = 0;
        let isRecording = false;
        let recordInterval;
        let recordSeconds = 0;

        // Respostas dinâmicas simuladas do bot inteligente
        const botAnswers = [
            "Excelente pergunta! Estou processando seu pedido de forma nativa. ⚙️",
            "Nossa interface em JavaScript é ultra responsiva! Viu os efeitos de clique? 📱",
            "Recebi sua mensagem perfeitamente por aqui! 🔥",
            "Como inteligência artificial, estou aqui para otimizar seus designs! 💡",
            "Que incrível! Continue testando todas as mecânicas. 🚀"
        ];

        // Mudar Wallpaper
        btnWallpaper.addEventListener('click', () => {
            currentWallpaperIdx = (currentWallpaperIdx + 1) % wallpapers.length;
            chatMessages.style.background = wallpapers[currentWallpaperIdx];
        });

        // Alternar Bottom Sheet de Emojis
        btnEmoji.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('active');
        });

        emojiPicker.querySelectorAll('span').forEach(emoji => {
            emoji.addEventListener('click', () => {
                messageInput.value += emoji.innerText;
                toggleSendButton();
                messageInput.focus();
            });
        });

        document.addEventListener('click', () => {
            emojiPicker.classList.remove('active');
        });
        emojiPicker.addEventListener('click', (e) => e.stopPropagation());

        // Ajuste dinâmico de altura do input (estilo WhatsApp)
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
            toggleSendButton();
        });

        function toggleSendButton() {
            if (messageInput.value.trim().length > 0) {
                btnSend.innerHTML = '➔';
                btnSend.style.background = '#4f46e5';
            } else {
                btnSend.innerHTML = '🎤';
                btnSend.style.background = '#4f46e5';
            }
        }

        // Obter hora atual formatada
        function getFormattedTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Criar mensagem na tela
        function appendMessage(content, type, options = {}) {
            const row = document.createElement('div');
            row.classList.add('message-row', type);

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble');

            if (options.isImage) {
                const img = document.createElement('img');
                img.src = content;
                img.alt = "Imagem";
                img.onload = () => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                };
                bubble.appendChild(img);
            } else if (options.isAudio) {
                // Template de player de áudio estilizado
                bubble.innerHTML = `
                    <div class="audio-player-bubble">
                        <button class="audio-play-btn">▶</button>
                        <div class="audio-waveform">
                            ${Array(15).fill().map(() => `<div class="wave-bar active" style="height: ${Math.floor(Math.random() * 80) + 20}%"></div>`).join('')}
                        </div>
                        <span style="font-size: 0.75rem; color: #fff;">${content}</span>
                    </div>
                `;
                // Simulação simples de Play/Pause no clique
                const playBtn = bubble.querySelector('.audio-play-btn');
                playBtn.addEventListener('click', () => {
                    playBtn.innerHTML = playBtn.innerHTML === '▶' ? '⏸' : '▶';
                });
            } else {
                bubble.innerText = content;
            }

            // Metadados (Hora e status ✓✓)
            const meta = document.createElement('div');
            meta.classList.add('message-meta');
            meta.innerHTML = `<span class="meta-time">${getFormattedTime()}</span>`;
            
            if (type === 'sent') {
                meta.innerHTML += ` <span class="status-check">✓✓</span>`;
            }

            bubble.appendChild(meta);
            row.appendChild(bubble);
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Simulador de Efeito "Digitando..."
        function showTypingIndicator() {
            chatStatus.innerText = "Digitando...";
            chatStatus.style.color = "#a855f7";

            const row = document.createElement('div');
            row.classList.add('message-row', 'received');
            row.id = 'typingIndicatorRow';

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble', 'typing-bubble');
            bubble.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;

            row.appendChild(bubble);
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            chatStatus.innerText = "Online";
            chatStatus.style.color = "#34d399";
            const indicator = document.getElementById('typingIndicatorRow');
            if (indicator) indicator.remove();
        }

        // Lidar com envio e gatilhos de áudio
        function handleAction() {
            const text = messageInput.value.trim();

            if (text === '') {
                // Entra no fluxo de gravação de áudio simulada
                if (!isRecording) {
                    startRecording();
                } else {
                    stopAndSendRecording();
                }
                return;
            }

            // Envia texto
            appendMessage(text, 'sent');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            toggleSendButton();
            emojiPicker.classList.remove('active');

            // Simula resposta inteligente após delay com animação de digitação
            setTimeout(() => {
                showTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator();
                    const randomAnswer = botAnswers[Math.floor(Math.random() * botAnswers.length)];
                    appendMessage(randomAnswer, 'received');
                }, 1500);
            }, 800);
        }

        // Funções do Simulador de Áudio
        function startRecording() {
            isRecording = true;
            messageInput.style.display = 'none';
            recordingContainer.style.display = 'flex';
            btnSend.innerHTML = '⏹';
            btnSend.style.background = '#ef4444';
            
            recordSeconds = 0;
            recordInterval = setInterval(() => {
                recordSeconds++;
                const mins = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
                const secs = String(recordSeconds % 60).padStart(2, '0');
                recordTimer.innerText = `Gravando ${mins}:${secs}`;
            }, 1000);
        }

        function stopAndSendRecording() {
            isRecording = false;
            clearInterval(recordInterval);
            messageInput.style.display = 'block';
            recordingContainer.style.display = 'none';
            toggleSendButton();

            const mins = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
            const secs = String(recordSeconds % 60).padStart(2, '0');
            const durationStr = `${mins}:${secs}`;

            appendMessage(durationStr, 'sent', { isAudio: true });

            // Resposta do bot ao áudio recebido
            setTimeout(() => {
                showTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator();
                    appendMessage("Que áudio legal! Entendi perfeitamente o que você disse no comando de voz! 🎙️👂", 'received');
                }, 1500);
            }, 800);
        }

        btnSend.addEventListener('click', handleAction);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleAction();
            }
        });

        // Upload e Envio de imagem melhorado
        btnFile.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const localImgUrl = URL.createObjectURL(file);
            appendMessage(localImgUrl, 'sent', { isImage: true });

            setTimeout(() => {
                showTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator();
                    appendMessage("Uau, belo arquivo! O processamento no dispositivo móvel de imagem foi concluído com sucesso. 📸✅", 'received');
                }, 1500);
            }, 800);

            fileInput.value = '';
        });
    </script>
</body>
</html>
