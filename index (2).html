<script>
    // Elementos da autenticação
    const authScreen = document.getElementById('authScreen');
    const chatContainer = document.getElementById('chatContainer');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const errorMsg = document.getElementById('errorMsg');

    // Elementos do chat
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const inputWrapper = document.getElementById('inputWrapper');
    const btnSend = document.getElementById('btnSend');
    const btnEmoji = document.getElementById('btnEmoji');
    const emojiPicker = document.getElementById('emojiPicker');
    const btnWallpaper = document.getElementById('btnWallpaper');
    const btnFile = document.getElementById('btnFile');
    const fileInput = document.getElementById('fileInput');
    const chatStatus = document.getElementById('chatStatus');
    const recordingContainer = document.getElementById('recordingContainer');
    const recordTimer = document.getElementById('recordTimer');

    let userSessionName = "Usuário";

    // --- VERIFICA SE JÁ EXISTE SESSÃO SALVA ---
    window.addEventListener('DOMContentLoaded', () => {
        const savedUser = localStorage.getItem('chat_username');
        if (savedUser) {
            userSessionName = savedUser;
            entrarNoChat(true); // Entra direto sem transição demorada
        }
    });

    // --- SISTEMA DE LOGIN E AUTENTICAÇÃO MELHORADO ---
    function handleLogin() {
        const emailValue = emailInput.value.trim();
        const passwordValue = passwordInput.value.trim();

        if (emailValue === "" || passwordValue === "") {
            showError("Por favor, preencha todos os campos.");
            return;
        }

        // Se tiver um '@', tratamos como e-mail e extraímos o nome
        if (emailValue.includes('@')) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailValue)) {
                showError("Formato de e-mail inválido (ex: nome@email.com).");
                return;
            }
            const rawName = emailValue.split('@')[0];
            userSessionName = rawName.charAt(0).toUpperCase() + rawName.slice(1);
        } else {
            // Se não for e-mail, usamos o próprio texto como nome de usuário
            userSessionName = emailValue.charAt(0).toUpperCase() + emailValue.slice(1);
        }

        // Salva na memória do navegador para não precisar logar de novo
        localStorage.setItem('chat_username', userSessionName);
        
        errorMsg.style.display = 'none';
        entrarNoChat(false);
    }

    function showError(message) {
        errorMsg.innerText = message;
        errorMsg.style.display = 'block';
        // Efeito de tremer o card de login ao dar erro
        const card = document.querySelector('.auth-card');
        card.style.animation = 'none';
        setTimeout(() => {
            card.style.animation = 'shake 0.4s ease-in-out';
        }, 10);
    }

    function entrarNoChat(immediate = false) {
        if (immediate) {
            authScreen.style.display = 'none';
            chatContainer.classList.add('active');
        } else {
            authScreen.classList.add('hidden');
            setTimeout(() => {
                authScreen.style.display = 'none';
                chatContainer.classList.add('active');
                
                // Mensagem de boas-vindas personalizada
                setTimeout(() => {
                    showTypingIndicator();
                    setTimeout(() => {
                        removeTypingIndicator();
                        appendMessage(`Olá, ${userSessionName}! Login realizado com sucesso. Suas mensagens agora estão seguras. 🌟🔒`, 'received');
                    }, 1200);
                }, 500);
            }, 500);
        }
    }

    // --- COMPORTAMENTOS DO CHAT ---
    const wallpapers = [
        'linear-gradient(135deg, #121026 0%, #070514 100%)',
        'linear-gradient(135deg, #0f172a 0%, #0284c7 100%)',
        'linear-gradient(135deg, #090d16 0%, #1e1b4b 100%)',
        '#111827',
        'linear-gradient(to top, #09203f 0%, #537895 100%)'
    ];
    let currentWallpaperIdx = 0;
    let isRecording = false;
    let recordInterval;
    let recordSeconds = 0;

    const botAnswers = [
        "Excelente pergunta! Estou processando seu pedido de forma nativa. ⚙️",
        "Nossa interface em JavaScript é ultra responsiva! Viu os efeitos de clique? 📱",
        "Recebi sua mensagem perfeitamente por aqui! 🔥",
        "Como inteligência artificial, estou aqui para otimizar seus designs! 💡",
        "Que incrível! Continue testando todas as mecânicas. 🚀"
    ];

    // Mudar Wallpaper
    btnWallpaper.addEventListener('click', () => {
        currentWallpaperIdx = (currentWallpaperIdx + 1) % wallpapers.length;
        chatMessages.style.background = wallpapers[currentWallpaperIdx];
    });

    // Alternar Bottom Sheet de Emojis
    btnEmoji.addEventListener('click', (e) => {
        e.stopPropagation();
        emojiPicker.classList.toggle('active');
    });

    emojiPicker.querySelectorAll('span').forEach(emoji => {
        emoji.addEventListener('click', () => {
            messageInput.value += emoji.innerText;
            toggleSendButton();
            messageInput.focus();
        });
    });

    document.addEventListener('click', () => {
        emojiPicker.classList.remove('active');
    });
    emojiPicker.addEventListener('click', (e) => e.stopPropagation());

    // Ajuste dinâmico de altura do input
    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = messageInput.scrollHeight + 'px';
        toggleSendButton();
    });

    function toggleSendButton() {
        if (messageInput.value.trim().length > 0) {
            btnSend.innerHTML = '➔';
            btnSend.style.background = '#4f46e5';
        } else {
            btnSend.innerHTML = '🎤';
            btnSend.style.background = '#4f46e5';
        }
    }

    function getFormattedTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Criar mensagem na tela
    function appendMessage(content, type, options = {}) {
        const row = document.createElement('div');
        row.classList.add('message-row', type);

        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble');

        if (options.isImage) {
            const img = document.createElement('img');
            img.src = content;
            img.alt = "Imagem";
            img.onload = () => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            };
            bubble.appendChild(img);
        } else if (options.isAudio) {
            bubble.innerHTML = `
                <div class="audio-player-bubble">
                    <button class="audio-play-btn">▶</button>
                    <div class="audio-waveform">
                        ${Array(18).fill().map(() => `<div class="wave-bar" style="height: ${Math.floor(Math.random() * 80) + 20}%"></div>`).join('')}
                    </div>
                    <span style="font-size: 0.75rem; color: #fff; white-space: nowrap;">${content}</span>
                </div>
            `;

            const playBtn = bubble.querySelector('.audio-play-btn');
            const waveBars = bubble.querySelectorAll('.wave-bar');
            
            playBtn.addEventListener('click', () => {
                if (playBtn.innerHTML === '▶') {
                    playBtn.innerHTML = '⏸';
                    waveBars.forEach(bar => {
                        bar.classList.add('animating');
                        bar.style.animationDelay = `${Math.random() * 0.5}s`;
                    });
                } else {
                    playBtn.innerHTML = '▶';
                    waveBars.forEach(bar => bar.classList.remove('animating'));
                }
            });
        } else {
            bubble.innerText = content;
        }

        const meta = document.createElement('div');
        meta.classList.add('message-meta');
        meta.innerHTML = `<span class="meta-time">${getFormattedTime()}</span>`;
        
        if (type === 'sent') {
            meta.innerHTML += ` <span class="status-check">✓✓</span>`;
        }

        bubble.appendChild(meta);
        row.appendChild(bubble);
        chatMessages.appendChild(row);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Simulador de Efeito "Digitando..."
    function showTypingIndicator() {
        chatStatus.innerText = "Digitando...";
        chatStatus.style.color = "#a855f7";

        const row = document.createElement('div');
        row.classList.add('message-row', 'received');
        row.id = 'typingIndicatorRow';

        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble', 'typing-bubble');
        bubble.innerHTML = `
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        `;

        row.appendChild(bubble);
        chatMessages.appendChild(row);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTypingIndicator() {
        chatStatus.innerText = "Online";
        chatStatus.style.color = "#34d399";
        const indicator = document.getElementById('typingIndicatorRow');
        if (indicator) indicator.remove();
    }

    // Lidar com envio e gravação
    function handleAction() {
        const text = messageInput.value.trim();

        if (text === '') {
            if (!isRecording) {
                startRecording();
            } else {
                stopAndSendRecording();
            }
            return;
        }

        appendMessage(text, 'sent');
        messageInput.value = '';
        messageInput.style.height = 'auto';
        toggleSendButton();
        emojiPicker.classList.remove('active');

        setTimeout(() => {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                const randomAnswer = botAnswers[Math.floor(Math.random() * botAnswers.length)];
                appendMessage(`${userSessionName}, ${randomAnswer.toLowerCase()}`, 'received');
            }, 1500);
        }, 800);
    }

    // Funções do Simulador de Áudio
    function startRecording() {
        isRecording = true;
        messageInput.style.display = 'none';
        recordingContainer.style.display = 'flex';
        btnSend.innerHTML = '⏹';
        btnSend.style.background = '#ef4444';
        
        recordSeconds = 0;
        recordInterval = setInterval(() => {
            recordSeconds++;
            const mins = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
            const secs = String(recordSeconds % 60).padStart(2, '0');
            recordTimer.innerText = `Gravando ${mins}:${secs}`;
        }, 1000);
    }

    function stopAndSendRecording() {
        isRecording = false;
        clearInterval(recordInterval);
        messageInput.style.display = 'block';
        recordingContainer.style.display = 'none';
        toggleSendButton();

        const mins = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
        const secs = String(recordSeconds % 60).padStart(2, '0');
        const durationStr = `${mins}:${secs}`;

        appendMessage(durationStr, 'sent', { isAudio: true });

        setTimeout(() => {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage(`Áudio recebido, ${userSessionName}! Analisei seu comando por voz de ${durationStr}. 🎤💪`, 'received');
            }, 1500);
        }, 800);
    }

    btnSend.addEventListener('click', handleAction);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleAction();
        }
    });

    // Upload e Envio de imagem
    btnFile.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const localImgUrl = URL.createObjectURL(file);
        appendMessage(localImgUrl, 'sent', { isImage: true });

        setTimeout(() => {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                appendMessage(`Processamento concluído, ${userSessionName}! Ótima foto. 📸✅`, 'received');
            }, 1500);
        }, 800);

        fileInput.value = '';
    });
</script>
